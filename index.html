<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<!-- Monetag Verification -->
<meta name="monetag-site-verification" content="ae506a2bf383a0919939a7331111db67">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 400px;
    background: #111827;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
    margin-bottom: 10px;
    color: #22c55e;
}

#result {
    width: 100%;
    height: 60px;
    font-size: 24px;
    text-align: right;
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-bottom: 15px;
    background-color: #1e293b;
    color: #fff;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
}

button {
    height: 55px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
}

button:hover {
    opacity: 0.8;
}

.operator { background: #f59e0b; color: #fff; }
.equal { background: #10b981; color: #fff; }
.clear { background: #ef4444; color: #fff; }
.function { background: #3b82f6; color: #fff; }
.number { background: #6b7280; color: #fff; }

#ad-banner {
    text-align: center;
    margin: 10px 0;
    padding: 5px;
    background-color: #1e293b;
    border-radius: 10px;
}
</style>
</head>

<body>
<div class="container">
    <h2>Scientific Calculator 🧮</h2>

    <!-- Banner Ad -->
    <div id="ad-banner">
        <!-- Replace with Monetag banner script after verification -->
        <p>Banner Ad Placeholder</p>
    </div>

    <input type="text" id="result" disabled>

    <div class="buttons">
        <button class="function" onclick="press('sin(')">sin</button>
        <button class="function" onclick="press('cos(')">cos</button>
        <button class="function" onclick="press('tan(')">tan</button>
        <button class="function" onclick="press('Math.sqrt(')">√</button>
        <button class="clear" onclick="clearResult()">C</button>

        <button class="number" onclick="press('7')">7</button>
        <button class="number" onclick="press('8')">8</button>
        <button class="number" onclick="press('9')">9</button>
        <button class="operator" onclick="press('/')">÷</button>
        <button class="operator" onclick="press('%')">%</button>

        <button class="number" onclick="press('4')">4</button>
        <button class="number" onclick="press('5')">5</button>
        <button class="number" onclick="press('6')">6</button>
        <button class="operator" onclick="press('*')">×</button>
        <button class="operator" onclick="press('^')">^</button>

        <button class="number" onclick="press('1')">1</button>
        <button class="number" onclick="press('2')">2</button>
        <button class="number" onclick="press('3')">3</button>
        <button class="operator" onclick="press('-')">−</button>
        <button class="function" onclick="press('(')">(</button>

        <button class="number" onclick="press('0')">0</button>
        <button class="number" onclick="press('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
        <button class="operator" onclick="press('+')">+</button>
        <button class="function" onclick="press(')')">)</button>
    </div>
</div>

<script>
let result = document.getElementById("result");
let calcCount = 0;

function press(val) {
    result.value += val;
}

function calculate() {
    try {
        let expr = result.value.replace(/\^/g, "**");
        result.value = Function("return " + expr)();
        calcCount++;
        triggerAds();
    } catch {
        result.value = "Error";
    }
}

function clearResult() {
    result.value = "";
}

// --- Auto Ad Placeholders ---
function triggerAds() {
    if(calcCount % 2 === 0){
        showInterstitial();
        showRewardedAd();
    }
}

function showInterstitial() {
    if(navigator.onLine){
        console.log("Interstitial Ad Placeholder — replace with Monetag script");
        // MonetagInterstitial.show();
    }
}

function showRewardedAd() {
    if(navigator.onLine){
        console.log("Video/Rewarded Ad Placeholder — replace with Monetag script");
        // MonetagVideo.show();
    }
}
</script>
</body>
</html>
